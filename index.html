<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>affiliate-bio-page</title>
  <meta name="description" content="Halaman link affiliate sederhana." />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --surface-2: #232323;
      --text: #f4f4f4;
      --muted: #b8b8b8;
      --border: rgba(255,255,255,.08);
      --accent: #25c2a0;
      --radius: 16px;
      --shadow: 0 10px 30px rgba(0,0,0,.22);
      --font: 'Satoshi', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: radial-gradient(circle at top, rgba(37,194,160,.15), transparent 28%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding: 24px 16px 48px;
    }
    .container {
      width: min(100%, 680px);
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      display: block;
      margin: 0 auto 14px;
      object-fit: cover;
      box-shadow: var(--shadow);
    }
    h1 {
      font-size: clamp(1.6rem, 1.2rem + 1.2vw, 2.2rem);
      margin-bottom: 8px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 34ch;
      margin: 0 auto;
    }
    
    /* Search Bar Styles */
    .search-container {
      margin-top: 24px;
      margin-bottom: 16px;
    }
    .search-input {
      width: 100%;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,194,160,.15);
    }
    .search-input::placeholder {
      color: var(--muted);
    }

    .list {
      display: grid;
      gap: 12px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      color: var(--text);
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .item:hover {
      transform: translateY(-2px);
      border-color: rgba(37,194,160,.35);
    }
    .number {
      width: 36px;
      height: 36px;
      flex: none;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(37,194,160,.14);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
    }
    .name {
      font-size: 1rem;
      font-weight: 600;
      /* Memastikan teks yang panjang tidak merusak layout */
      word-break: break-word; 
    }
    .footer {
      margin-top: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    
    /* Loading & Error States */
    .status-message {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <img src="pp.png" alt="Profile Picture" class="avatar" />
      <h1>Daftar Produk</h1>
      <p class="subtitle">Cari nomor atau nama produk yang ada di video.</p>
    </header>

    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Cari nomor (misal: 1) atau nama produk..." autocomplete="off" />
    </div>

    <div id="statusMessage" class="status-message">Memuat daftar produk...</div>

    <section id="linksContainer" class="list hidden">
      <!-- Item link akan di-generate oleh JavaScript di sini -->
    </section>

    <p class="footer">Diperbarui secara otomatis.</p>
  </main>

  <script>
    // Link CSV dari Google Sheets Anda
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1geuQ-F_6wugoj_yiRg4h5Exkmoj-SK0SGB3res5oIhkXXzWpt22UB5YbDONaIFJD4CJL5RjnDgjs/pub?output=csv';
    
    let allProducts = [];

    // Fungsi sederhana untuk mem-parsing CSV
    function parseCSV(text) {
      const lines = text.split('\n').filter(line => line.trim() !== '');
      const data = [];
      
      // Lewati baris pertama (header: nama, produk, link)
      for (let i = 1; i < lines.length; i++) {
        // Regex untuk split berdasarkan koma, tapi mengabaikan koma di dalam tanda kutip ganda
        const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        
        if (row.length >= 3) {
          data.push({
            // Menghilangkan tanda kutip jika ada
            nomor: row[0].replace(/(^"|"$)/g, '').trim(),
            nama: row[1].replace(/(^"|"$)/g, '').trim(),
            link: row[2].replace(/(^"|"$)/g, '').trim()
          });
        }
      }
      return data;
    }

    function renderLinks(products) {
      const container = document.getElementById('linksContainer');
      const statusMessage = document.getElementById('statusMessage');
      
      container.innerHTML = ''; // Kosongkan container

      if (products.length === 0) {
        statusMessage.textContent = 'Tidak ada produk yang ditemukan.';
        statusMessage.classList.remove('hidden');
        container.classList.add('hidden');
        return;
      }

      // Sembunyikan pesan status, tampilkan container
      statusMessage.classList.add('hidden');
      container.classList.remove('hidden');

      products.forEach(product => {
        // Abaikan baris kosong jika ada
        if (!product.nomor || !product.nama || !product.link) return;

        // Pastikan link valid (tambah https:// jika belum ada agar bisa di-klik)
        let finalLink = product.link;
        if (!finalLink.startsWith('http://') && !finalLink.startsWith('https://')) {
          finalLink = 'https://' + finalLink;
        }

        const a = document.createElement('a');
        a.className = 'item';
        a.href = finalLink;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        const spanNumber = document.createElement('span');
        spanNumber.className = 'number';
        spanNumber.textContent = product.nomor;

        const spanName = document.createElement('span');
        spanName.className = 'name';
        spanName.textContent = product.nama;

        a.appendChild(spanNumber);
        a.appendChild(spanName);
        container.appendChild(a);
      });
    }

    // Fungsi untuk mengambil data dari CSV
    async function fetchData() {
      try {
        // Tambahkan timestamp untuk menghindari cache dari browser
        const response = await fetch(CSV_URL + '&t=' + new Date().getTime());
        if (!response.ok) throw new Error('Gagal mengambil data');
        
        const csvText = await response.text();
        allProducts = parseCSV(csvText);
        
        renderLinks(allProducts);
      } catch (error) {
        console.error('Error fetching CSV:', error);
        document.getElementById('statusMessage').textContent = 'Terjadi kesalahan saat memuat data. Silakan refresh halaman.';
      }
    }

    // Fitur Pencarian
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase();
      
      const filteredProducts = allProducts.filter(product => {
        return product.nomor.toLowerCase().includes(searchTerm) || 
               product.nama.toLowerCase().includes(searchTerm);
      });
      
      renderLinks(filteredProducts);
    });

    // Jalankan saat halaman pertama kali dimuat
    fetchData();
  </script>
</body>
</html>
